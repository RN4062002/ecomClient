name: Client CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Using LTS version
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    # Uncomment the step below if you configure ESLint and add a "lint" script to package.json
    # - name: Run Linter
    #   run: npm run lint
      
    - name: Build project
      # Ensure there are no build errors
      run: npm run build
      
  deploy:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only run deploy on push to main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Trigger Render Deploy Hook
      env:
        deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -z "$deploy_url" ]; then
          echo "ERROR: RENDER_DEPLOY_HOOK_URL secret is not set!"
          exit 1
        fi
        echo "Triggering deployment to Render..."
        curl -X POST -d "" "$deploy_url"
